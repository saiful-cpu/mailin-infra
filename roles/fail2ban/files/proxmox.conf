# Fail2ban filter for Proxmox VE web UI (pvedaemon)
# Matches: authentication failure; rhost=::ffff:x.x.x.x user=root@pam

[INCLUDES]
before = common.conf

[Definition]
failregex = authentication failure; rhost=(?:::ffff:)?<HOST> user=.*$
ignoreregex =
journalmatch = _SYSTEMD_UNIT=pvedaemon.service
