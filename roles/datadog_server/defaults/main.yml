---
# ── Datadog ───────────────────────────────────────────────────────────────────
dd_api_key: "{{ vault_dd_api_key | default(lookup('env', 'DD_API_KEY')) }}"
dd_site: "datadoghq.com"
dd_env: "prod"

dd_valid_sites:
  - datadoghq.com
  - datadoghq.eu
  - us3.datadoghq.com
  - us5.datadoghq.com
  - ddog-gov.com

dd_conf_dir: /etc/datadog-agent
dd_confd_dir: /etc/datadog-agent/conf.d

# Minimum acceptable agent version — upgrade automatically if installed version is below this.
# Set to "" to disable version-gated upgrades (only dd_force_update will trigger reinstall).
dd_agent_min_version: "7.76.3"

# Set true to force reinstall regardless of current version
dd_force_update: false

# ── Feature flags ─────────────────────────────────────────────────────────────
dd_apm_enabled: false
dd_process_enabled: false
dd_npm_enabled: false         # Network Performance Monitoring (system-probe)
dd_logs_enabled: true
dd_log_level: warn            # Reduces agent log verbosity (default: info)

dd_min_collection_interval: 30  # Seconds between metric polls (default: 15)

# ── Proxmox API ───────────────────────────────────────────────────────────────
proxmox_host: "localhost"
proxmox_port: 8006
proxmox_ssl_verify: false
# Per-host vars (host_vars/<hostname>/vault.yml) take precedence over group vault.
# For clustered Proxmox: set vault_proxmox_api_* in vars/vault_proxmox.yml.
# For standalone nodes:  set vault_proxmox_api_* in host_vars/<hostname>/vault.yml.
proxmox_api_user: "{{ vault_proxmox_api_user | default('datadog@pam') }}"
proxmox_api_token_name: "{{ vault_proxmox_api_token_name | default('datadog') }}"
proxmox_api_token_secret: "{{ vault_proxmox_api_token_secret | default('') }}"

# ── Redis ─────────────────────────────────────────────────────────────────────
redis_host: "localhost"
redis_port: 6379
redis_password: "{{ vault_redis_password | default('') }}"

# ── Memcached ─────────────────────────────────────────────────────────────────
memcached_host: "localhost"
memcached_port: 11211

# ── Mailcow ───────────────────────────────────────────────────────────────────
mailcow_search_paths:
  - /opt/mailcow-dockerized
  - /opt/mailcow
  - /srv/mailcow-dockerized
  - /root/mailcow-dockerized

# ── Postal ────────────────────────────────────────────────────────────────────
postal_search_paths:
  - /opt/postal
  - /etc/postal

# ── Postfix ───────────────────────────────────────────────────────────────────
postfix_log_paths:
  debian: /var/log/mail.log
  rhel: /var/log/maillog

# ── Disk ──────────────────────────────────────────────────────────────────────
disk_excluded_filesystems:
  - tmpfs
  - devtmpfs
  - squashfs
  - overlay
  - nsfs
  - shm
  - fuse.lxcfs
