---
- name: Remove stale postal.d directory (wrong check type)
  file:
    path: "{{ dd_confd_dir }}/postal.d"
    state: absent
  notify: restart datadog-agent

- name: Create http_check.d conf directory
  file:
    path: "{{ dd_confd_dir }}/http_check.d"
    state: directory
    owner: dd-agent
    group: dd-agent
    mode: '0750'

- name: Deploy Postal HTTP check config
  template:
    src: postal_http_check.yaml.j2
    dest: "{{ dd_confd_dir }}/http_check.d/postal.yaml"
    owner: dd-agent
    group: dd-agent
    mode: '0640'
  notify: restart datadog-agent

- name: Create tcp_check.d conf directory (Postal)
  file:
    path: "{{ dd_confd_dir }}/tcp_check.d"
    state: directory
    owner: dd-agent
    group: dd-agent
    mode: '0750'

- name: Deploy Postal TCP port check config
  template:
    src: postal_tcp_check.yaml.j2
    dest: "{{ dd_confd_dir }}/tcp_check.d/conf.yaml"
    owner: dd-agent
    group: dd-agent
    mode: '0640'
  notify: restart datadog-agent

- name: Create postal_logs.d conf directory
  file:
    path: "{{ dd_confd_dir }}/postal_logs.d"
    state: directory
    owner: dd-agent
    group: dd-agent
    mode: '0750'

- name: Deploy Postal log collection config
  template:
    src: postal_logs.yaml.j2
    dest: "{{ dd_confd_dir }}/postal_logs.d/conf.yaml"
    owner: dd-agent
    group: dd-agent
    mode: '0640'
  notify: restart datadog-agent
