---
# ── datadog.yaml (fully managed — template owns the entire file) ──────────────
- name: Deploy datadog.yaml
  template:
    src: datadog.yaml.j2
    dest: "{{ dd_conf_dir }}/datadog.yaml"
    owner: dd-agent
    group: dd-agent
    mode: '0640'
    backup: yes
  notify: restart datadog-agent

# ── system-probe.yaml (fully managed — template owns the entire file) ─────────
- name: Deploy system-probe.yaml
  template:
    src: system-probe.yaml.j2
    dest: "{{ dd_conf_dir }}/system-probe.yaml"
    owner: root
    group: dd-agent
    mode: '0640'
    backup: yes
  notify: restart datadog-agent-sysprobe
  when: dd_npm_enabled | bool

- name: Clear system-probe.yaml when NPM disabled
  copy:
    content: |
      ## system-probe.yaml
      ## Managed by Ansible — do not edit manually
    dest: "{{ dd_conf_dir }}/system-probe.yaml"
    owner: root
    group: dd-agent
    mode: '0640'
  notify: restart datadog-agent-sysprobe
  when: not (dd_npm_enabled | bool)

- name: Ensure system-probe service is started and enabled
  service:
    name: datadog-agent-sysprobe
    state: started
    enabled: yes
  when: dd_npm_enabled | bool
  failed_when: false

- name: Stop and disable system-probe service
  service:
    name: datadog-agent-sysprobe
    state: stopped
    enabled: no
  when: not (dd_npm_enabled | bool)
  failed_when: false

# ── Group memberships ─────────────────────────────────────────────────────────
- name: Gather group database
  getent:
    database: group
  ignore_errors: true

- name: Add dd-agent to systemd-journal group
  user:
    name: dd-agent
    groups: systemd-journal
    append: yes
  when: "'systemd-journal' in (ansible_facts.getent_group | default({}))"

- name: Add dd-agent to docker group
  user:
    name: dd-agent
    groups: docker
    append: yes
  when:
    - has_docker | bool
    - "'docker' in (ansible_facts.getent_group | default({}))"
