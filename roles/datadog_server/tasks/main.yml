---
- name: Validate required variables
  assert:
    that:
      - dd_api_key is defined
      - dd_api_key | length > 0
      - dd_site in dd_valid_sites
    fail_msg: "dd_api_key is required and dd_site must be a valid Datadog endpoint."
  tags: [always]

- name: Detect services
  import_tasks: detect.yml
  tags: [detect, always]

- name: Install Datadog agent
  import_tasks: install.yml
  tags: [install]

- name: Reset config (wipe conf.d + core files before clean provision)
  import_tasks: reset_config.yml
  tags: [reset]

- name: Backup existing datadog config
  import_tasks: backup_config.yml
  tags: [configure, backup]
  when: "'reset' not in ansible_run_tags"

- name: Configure core (APM / process / NPM / logs)
  import_tasks: configure_core.yml
  tags: [configure, core]

- name: Ensure built-in system checks are present
  import_tasks: configure_system_checks.yml
  tags: [configure, core]

- name: Configure Docker integration
  import_tasks: configure_docker.yml
  tags: [configure, docker]
  when: has_docker | bool

- name: Configure Mailcow integration
  import_tasks: configure_mailcow.yml
  tags: [configure, mailcow]
  when: has_mailcow | bool

- name: Configure Postal integration
  import_tasks: configure_postal.yml
  tags: [configure, postal]
  when: has_postal | bool

- name: Configure Postfix integration
  import_tasks: configure_postfix.yml
  tags: [configure, postfix]
  when: has_postfix | bool

- name: Configure Redis integration
  import_tasks: configure_redis.yml
  tags: [configure, redis]
  when: has_redis | bool

- name: Configure Memcached integration
  import_tasks: configure_memcached.yml
  tags: [configure, memcached]
  when: has_memcached | bool

- name: Configure Proxmox integration
  import_tasks: configure_proxmox.yml
  tags: [configure, proxmox]
  when: has_proxmox | bool

- name: Configure process monitoring
  import_tasks: configure_process.yml
  tags: [configure, process]
  when: has_mailcow | bool or has_postal | bool

# ── Remove stale conf.d configs when services are no longer detected ──────────
- name: Remove stale docker.d if docker not detected
  file:
    path: "{{ dd_confd_dir }}/docker.d"
    state: absent
  when: not (has_docker | bool)
  notify: restart datadog-agent
  tags: [configure, cleanup]

- name: Remove stale redisdb.d if redis not detected
  file:
    path: "{{ dd_confd_dir }}/redisdb.d"
    state: absent
  when: not (has_redis | bool)
  notify: restart datadog-agent
  tags: [configure, cleanup]

- name: Remove stale mcache.d if memcached not detected
  file:
    path: "{{ dd_confd_dir }}/mcache.d"
    state: absent
  when: not (has_memcached | bool)
  notify: restart datadog-agent
  tags: [configure, cleanup]

- name: Remove stale process.d if no process-monitored service detected
  file:
    path: "{{ dd_confd_dir }}/process.d"
    state: absent
  when: not (has_mailcow | bool) and not (has_postal | bool)
  notify: restart datadog-agent
  tags: [configure, cleanup]

- name: Remove stale postfix.d if postfix not detected
  file:
    path: "{{ dd_confd_dir }}/postfix.d"
    state: absent
  when: not (has_postfix | bool)
  notify: restart datadog-agent
  tags: [configure, cleanup]

- name: Remove stale postfix sudoers if postfix not detected
  file:
    path: /etc/sudoers.d/datadog-postfix
    state: absent
  when: not (has_postfix | bool)
  tags: [configure, cleanup]

- name: Remove stale postal.d if postal not detected
  file:
    path: "{{ dd_confd_dir }}/postal.d"
    state: absent
  when: not (has_postal | bool)
  notify: restart datadog-agent
  tags: [configure, cleanup]

- name: Remove stale postal_logs.d if postal not detected
  file:
    path: "{{ dd_confd_dir }}/postal_logs.d"
    state: absent
  when: not (has_postal | bool)
  notify: restart datadog-agent
  tags: [configure, cleanup]

- name: Remove stale mailcow_logs.d if mailcow not detected
  file:
    path: "{{ dd_confd_dir }}/mailcow_logs.d"
    state: absent
  when: not (has_mailcow | bool)
  notify: restart datadog-agent
  tags: [configure, cleanup]

- name: Remove stale mailcow http_check if mailcow not detected
  file:
    path: "{{ dd_confd_dir }}/http_check.d/conf.yaml"
    state: absent
  when: not (has_mailcow | bool)
  notify: restart datadog-agent
  tags: [configure, cleanup]

- name: Remove stale postal http_check if postal not detected
  file:
    path: "{{ dd_confd_dir }}/http_check.d/postal.yaml"
    state: absent
  when: not (has_postal | bool)
  notify: restart datadog-agent
  tags: [configure, cleanup]

- name: Remove stale tcp_check conf if no tcp-checked service detected
  file:
    path: "{{ dd_confd_dir }}/tcp_check.d/conf.yaml"
    state: absent
  when: not (has_mailcow | bool) and not (has_postal | bool) and not (has_postfix | bool)
  notify: restart datadog-agent
  tags: [configure, cleanup]

- name: Remove stale proxmox.d if proxmox not detected
  file:
    path: "{{ dd_confd_dir }}/proxmox.d"
    state: absent
  when: not (has_proxmox | bool)
  notify: restart datadog-agent
  tags: [configure, cleanup]

- name: Remove stale journald.d if proxmox not detected
  file:
    path: "{{ dd_confd_dir }}/journald.d"
    state: absent
  when: not (has_proxmox | bool)
  notify: restart datadog-agent
  tags: [configure, cleanup]

- name: Configure disk monitoring
  import_tasks: configure_disk.yml
  tags: [configure, disk]

- name: Start and validate agent
  import_tasks: validate_agent.yml
  tags: [validate]
