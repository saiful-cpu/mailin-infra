---
- name: Ensure Datadog agent service is enabled and started
  service:
    name: datadog-agent
    state: started
    enabled: yes

- name: Wait for Datadog agent to become active
  command: systemctl is-active datadog-agent
  register: _dd_active
  until: _dd_active.stdout == 'active'
  retries: 15
  delay: 2
  changed_when: false

- name: Check agent status
  command: datadog-agent status
  register: _dd_status
  changed_when: false
  failed_when: false

- name: Show agent status summary
  debug:
    msg: "{{ _dd_status.stdout_lines[:25] }}"

- name: Show enabled integrations
  debug:
    msg: >-
      Integrations deployed:
      disk=always
      docker={{ has_docker }}
      mailcow={{ has_mailcow }}
      postal={{ has_postal }}
      postfix={{ has_postfix }}
      redis={{ has_redis }}
      memcached={{ has_memcached }}
      proxmox={{ has_proxmox }}
