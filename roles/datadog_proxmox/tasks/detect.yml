---
# ── Proxmox detection ─────────────────────────────────────────────────────────
- name: Check for Proxmox PVE config directory
  stat:
    path: /etc/pve
  register: _pve_dir

- name: Check for pveversion binary
  command: pveversion
  register: _pveversion
  changed_when: false
  failed_when: false

- name: Set has_proxmox fact
  set_fact:
    has_proxmox: "{{ _pve_dir.stat.exists and _pveversion.rc == 0 }}"

- name: Abort if not a Proxmox node
  fail:
    msg: >
      This host does not appear to be a Proxmox VE node
      (/etc/pve missing or pveversion not found).
      Remove it from [proxmox_nodes] or check your inventory.
  when: not has_proxmox | bool

# ── Proxmox node info ─────────────────────────────────────────────────────────
- name: Get Proxmox version
  set_fact:
    pve_version: "{{ _pveversion.stdout_lines[0] | default('unknown') }}"

- name: Get cluster name from corosync config
  slurp:
    src: /etc/pve/corosync.conf
  register: _corosync_conf
  failed_when: false

- name: Set pve_cluster fact
  set_fact:
    pve_cluster: >-
      {%- if _corosync_conf.content is defined -%}
        {%- set conf = _corosync_conf.content | b64decode -%}
        {%- set match = conf | regex_search('cluster_name:\\s*(\\S+)', '\\1') -%}
        {{ match[0] if match else 'standalone' }}
      {%- else -%}
        standalone
      {%- endif -%}

- name: Show Proxmox detection results
  debug:
    msg:
      - "has_proxmox  : {{ has_proxmox }}"
      - "pve_version  : {{ pve_version }}"
      - "pve_cluster  : {{ pve_cluster }}"
      - "pve_node     : {{ ansible_facts['hostname'] }}"
