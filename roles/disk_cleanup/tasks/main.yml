---
- name: Configure Docker log rotation
  import_tasks: docker_logs.yml
  tags: [disk_cleanup, docker_logs]
  when: has_docker | default(false) | bool

- name: Configure systemd journal limits
  import_tasks: journal.yml
  tags: [disk_cleanup, journal]

- name: Configure logrotate for syslog, kern.log, btmp
  import_tasks: logrotate.yml
  tags: [disk_cleanup, logrotate]

- name: Deploy disk purge script and cron
  import_tasks: purge_script.yml
  tags: [disk_cleanup, purge]
