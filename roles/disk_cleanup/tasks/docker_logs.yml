---
- name: Check if daemon.json already exists
  stat:
    path: /etc/docker/daemon.json
  register: _daemon_json_pre

- name: Ensure /etc/docker directory exists
  file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure Docker daemon log rotation
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
    backup: yes
  register: _daemon_json

- name: Truncate existing oversized container logs
  shell: |
    find /var/lib/docker/containers -name '*-json.log' -size +{{ docker_log_max_size }} \
      -exec truncate -s 0 {} \;
  changed_when: false
  failed_when: false

- name: Restart Docker (new config — daemon.json did not exist before)
  service:
    name: docker
    state: restarted
  when:
    - _daemon_json.changed
    - not _daemon_json_pre.stat.exists or disk_cleanup_restart_docker | bool
