---
- name: Deploy rsyslog logrotate config (syslog, kern.log, auth.log, etc.)
  template:
    src: logrotate-rsyslog.j2
    dest: /etc/logrotate.d/rsyslog
    owner: root
    group: root
    mode: '0644'
  register: rsyslog_logrotate

- name: Deploy btmp logrotate config
  template:
    src: logrotate-btmp.j2
    dest: /etc/logrotate.d/btmp
    owner: root
    group: root
    mode: '0644'
  register: btmp_logrotate

- name: Compress existing uncompressed rotated logs (syslog.1, kern.log.1, auth.log.1)
  shell: |
    for f in /var/log/syslog.1 /var/log/kern.log.1 /var/log/auth.log.1; do
      [ -f "$f" ] && gzip -9 "$f" || true
    done
  changed_when: false
  failed_when: false

- name: Force-run rsyslog logrotate to compress existing bloat
  command: logrotate -f /etc/logrotate.d/rsyslog
  when: rsyslog_logrotate.changed
  failed_when: false
  changed_when: false

- name: Force-run btmp logrotate to compress existing bloat
  command: logrotate -f /etc/logrotate.d/btmp
  when: btmp_logrotate.changed
  failed_when: false
  changed_when: false
