---
# ── Docker detection ──────────────────────────────────────────────────────────
- name: Check Docker binary
  command: docker info
  register: _docker_info
  changed_when: false
  failed_when: false

- name: Set has_docker fact
  set_fact:
    has_docker: "{{ _docker_info.rc == 0 }}"

- name: Get running container count
  command: docker ps -q
  register: _docker_ps
  changed_when: false
  failed_when: false
  when: has_docker | bool

- name: Set docker_container_count fact
  set_fact:
    docker_container_count: "{{ _docker_ps.stdout_lines | length }}"
  when: has_docker | bool

# ── Mailcow detection ─────────────────────────────────────────────────────────
- name: Check Mailcow config files in candidate paths
  stat:
    path: "{{ item }}/mailcow.conf"
  loop: "{{ mailcow_search_paths }}"
  register: _mailcow_conf_stat

- name: Check Mailcow compose files in candidate paths
  stat:
    path: "{{ item }}/docker-compose.yml"
  loop: "{{ mailcow_search_paths }}"
  register: _mailcow_compose_stat

- name: Determine Mailcow install path
  set_fact:
    mailcow_path: "{{ item.item }}"
  loop: "{{ _mailcow_conf_stat.results }}"
  when:
    - item.stat.exists
    - _mailcow_compose_stat.results[loop.index0].stat.exists
  loop_control:
    index_var: loop.index0

- name: Set has_mailcow fact
  set_fact:
    has_mailcow: "{{ mailcow_path is defined and mailcow_path | length > 0 }}"

- name: Read MAILCOW_HOSTNAME from mailcow.conf
  shell: "grep -E '^MAILCOW_HOSTNAME=' {{ mailcow_path }}/mailcow.conf | cut -d'=' -f2 | tr -d '\"'"
  register: _mailcow_hostname_raw
  changed_when: false
  when: has_mailcow | bool

- name: Set mailcow_hostname fact
  set_fact:
    mailcow_hostname: "{{ _mailcow_hostname_raw.stdout | trim | default('localhost') }}"
  when: has_mailcow | bool

# -- Redis Password

- name: Get Mailcow Redis password
  shell: grep "^REDISPASS=" {{ mailcow_path }}/mailcow.conf | cut -d'=' -f2
  register: _mailcow_redis_pass
  changed_when: false
  when: has_mailcow | bool

- name: Get Mailcow Redis port
  shell: grep "^REDIS_PORT=" {{ mailcow_path }}/mailcow.conf | cut -d'=' -f2 | cut -d':' -f2
  register: _mailcow_redis_port
  changed_when: false
  when: has_mailcow | bool

- name: Set Redis connection facts
  set_fact:
    redis_host: "127.0.0.1"
    redis_port: "{{ _mailcow_redis_port.stdout | default('6379') }}"
    redis_password: "{{ _mailcow_redis_pass.stdout | default('') }}"
  when: has_mailcow | bool

# ── Postfix detection (standalone only) ───────────────────────────────────────
- name: Check Postfix binary
  command: which postfix
  register: _postfix_bin
  changed_when: false
  failed_when: false

- name: Check Postfix config directory
  stat:
    path: /etc/postfix
  register: _postfix_conf_dir

- name: Check Postfix systemd service state
  command: systemctl is-active postfix
  register: _postfix_svc
  changed_when: false
  failed_when: false

# Only treat as standalone if systemd-managed AND not shadowed by Mailcow.
# Avoids the pgrep-master false positive from the original script.
- name: Set has_postfix fact
  set_fact:
    has_postfix: >-
      {{
        _postfix_bin.rc == 0 and
        _postfix_conf_dir.stat.exists and
        _postfix_svc.stdout == 'active' and
        not (has_mailcow | bool)
      }}

- name: Get Postfix queue directory
  command: postconf -h queue_directory
  register: _postfix_queue
  changed_when: false
  failed_when: false
  when: has_postfix | bool

- name: Set postfix_queue_dir fact
  set_fact:
    postfix_queue_dir: "{{ _postfix_queue.stdout | trim | default('/var/spool/postfix') }}"
  when: has_postfix | bool

- name: Set postfix_log_path fact
  set_fact:
    postfix_log_path: >-
      {{
        postfix_log_paths.rhel
        if ansible_os_family == 'RedHat'
        else postfix_log_paths.debian
      }}
  when: has_postfix | bool

# ── Mail type determination ───────────────────────────────────────────────────
- name: Determine mail_type from hostname
  set_fact:
    mail_type: >-
      {%- set h = ansible_hostname | lower -%}
      {%- if 'inbound' in h or h.startswith('in-') or h.endswith('-in') -%}
        inbound
      {%- elif 'outbound' in h or h.startswith('out-') or h.endswith('-out') -%}
        outbound
      {%- elif has_mailcow | bool -%}
        inbound
      {%- elif has_postfix | bool -%}
        outbound
      {%- else -%}
        unknown
      {%- endif -%}

# ── Summary ───────────────────────────────────────────────────────────────────
- name: Show detection results
  debug:
    msg:
      - "has_docker   : {{ has_docker }}"
      - "has_mailcow  : {{ has_mailcow }} {% if has_mailcow | bool %}({{ mailcow_path }}, hostname={{ mailcow_hostname }}){% endif %}"
      - "has_postfix  : {{ has_postfix }}"
      - "mail_type    : {{ mail_type }}"
