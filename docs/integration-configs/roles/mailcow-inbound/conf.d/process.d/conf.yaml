## ============================================================
## Process Integration — mailcow-inbound role
## Named process monitors with alerting thresholds.
## ⚠  Live reload: yes
## ============================================================
##
## Note: cpu/io/load/memory/uptime/file_handle are auto-collected by the Agent
## core checks with no conf.yaml required.
##
## Validate:
##   datadog-agent check process

init_config:

instances:
  ## ── Docker daemon ─────────────────────────────────────────────────────────────
  - name: dockerd
    search_string:
      - dockerd
    thresholds:
      critical:
        - 1   # min 1 process required
        - 1   # max 1 (exactly one daemon expected)
    collect_children: false
    tags:
      - service:docker

  ## ── Datadog Agent (self-monitoring) ───────────────────────────────────────────
  - name: datadog-agent
    search_string:
      - datadog-agent
    thresholds:
      critical:
        - 1
        - 3
    tags:
      - service:datadog-agent

  ## ── SSH daemon (availability indicator) ──────────────────────────────────────
  - name: sshd
    search_string:
      - sshd
    thresholds:
      warning:
        - 1
        - null  # no upper limit
    tags:
      - service:sshd
