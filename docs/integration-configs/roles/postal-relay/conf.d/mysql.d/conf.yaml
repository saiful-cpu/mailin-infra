## ============================================================
## MySQL Integration — postal-relay role
## Monitors the MySQL/MariaDB instance used by Postal.
## ⚠  Live reload: yes
## ============================================================
##
## SETUP: Create a read-only datadog monitoring user
## ──────────────────────────────────────────────────
## Run the following SQL as MySQL root:
##
##   CREATE USER 'datadog'@'localhost' IDENTIFIED BY '<STRONG_PASSWORD>';
##
##   -- Required for replication/binary log monitoring
##   GRANT REPLICATION CLIENT ON *.* TO 'datadog'@'localhost'
##     WITH MAX_USER_CONNECTIONS 5;
##
##   -- Required for process list and global status
##   GRANT PROCESS ON *.* TO 'datadog'@'localhost';
##
##   -- Required for performance_schema metrics
##   GRANT SELECT ON performance_schema.* TO 'datadog'@'localhost';
##
##   -- Required for schema-level metrics (table sizes, row counts)
##   -- Grant on the Postal database specifically:
##   GRANT SELECT ON postal.* TO 'datadog'@'localhost';
##
##   FLUSH PRIVILEGES;
##
## Verify connectivity:
##   mysql -u datadog -p'<PASSWORD>' -e "SHOW STATUS LIKE 'Uptime';"
##
## Validate:
##   datadog-agent check mysql

init_config:

instances:
  - ## @param host - string - required
    host: localhost

    ## @param port - integer - optional - default: 3306
    port: 3306

    ## @param username - string - required
    username: datadog

    ## @param password - string - required
    ## Use Datadog Secrets Management or an env var in production.
    password: <MYSQL_DATADOG_PASSWORD>

    ## @param dbm - boolean - optional - default: false
    ## Enable Database Monitoring (full query samples, explain plans).
    ## Requires additional grants — see DBM setup docs.
    dbm: false

    ## @param collect_events - boolean - optional - default: false
    collect_events: false

    ## @param options - mapping - optional
    ## Fine-grained control over which metric sets to collect.
    options:
      ## Replication lag and binary log metrics.
      replication: false          # set true if this is a replica
      replication_channel: ""

      ## Extra metrics from INFORMATION_SCHEMA / performance_schema.
      extra_status_metrics: true
      extra_innodb_metrics: true
      extra_performance_metrics: false   # high cardinality, enable carefully
      schema_size_metrics: true          # per-database size

      ## Disable deprecated metrics to reduce noise.
      disable_innodb_metrics: false

    ## @param tags - list of strings - optional
    tags:
      - service:mysql
      - component:database
      - role:postal-relay

## MySQL error log collection
logs:
  - type: file
    path: /var/log/mysql/error.log
    source: mysql
    service: mysql
    log_processing_rules:
      - type: multi_line
        name: new_log_start_with_date
        pattern: \d{4}-(0?[1-9]|1[012])-(0?[1-9]|[12][0-9]|3[01])

  - type: file
    path: /var/log/mysql/mysql-slow.log
    source: mysql
    service: mysql
