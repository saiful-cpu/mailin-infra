---
# Datadog Agent — Proxmox VE Node Deployment
#
# Deprecated: use site.yml or run_datadog.sh --site instead.
# This playbook now delegates to datadog_server (same role as site.yml).
#
# Usage:
#   ./run_datadog.sh --site -l proxmox_nodes
#
# Tags available: detect, install, configure, core, proxmox, disk, validate

- name: Install and configure Datadog agent on Proxmox nodes
  hosts: proxmox_nodes
  become: true
  gather_facts: true

  vars_files:
    - vars/vault.yml          # vault_dd_api_key

  vars:
    dd_api_key: "{{ vault_dd_api_key }}"
    dd_site: "datadoghq.com"
    dd_env: "prod"

  roles:
    - role: datadog_server
