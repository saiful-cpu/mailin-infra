---
# Datadog Agent — Proxmox VE Node Deployment
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini playbook_proxmox.yml --ask-vault-pass
#
# Limit to one node:
#   ansible-playbook -i inventory/hosts.ini playbook_proxmox.yml -l pve01 --ask-vault-pass
#
# Tags available:
#   detect      — detect Proxmox environment only
#   install     — install agent only
#   configure   — apply all configs (core + proxmox integration)
#   core        — datadog.yaml: APM, process, NPM, logs
#   proxmox     — Proxmox API check + disk + journald log configs
#   validate    — start agent and show status

- name: Install and configure Datadog agent on Proxmox nodes
  hosts: proxmox_nodes
  become: true
  gather_facts: true

  vars_files:
    - vars/vault.yml          # vault_dd_api_key
    - vars/vault_proxmox.yml  # vault_proxmox_api_user, vault_proxmox_api_token_*

  vars:
    dd_api_key: "{{ vault_dd_api_key }}"
    dd_site: "datadoghq.com"
    dd_env: "prod"

  roles:
    - role: datadog_proxmox
